name: Claude Issue Implement

on:
  issues:
    types: [opened, labeled]

jobs:
  implement-issue:
    if: contains(github.event.issue.labels.*.name, 'AI')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    concurrency:
      group: claude-issue-implement-${{ github.event.issue.number }}
      cancel-in-progress: true

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_BASE_URL: https://openrouter.ai/api
      ANTHROPIC_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Ensure OpenRouter secret exists
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "::error::OPENROUTER_API_KEY is missing. Check repository secrets."
            exit 1
          fi

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install GitHub MCP
        run: |
          claude mcp add-json github '{
            "type": "http",
            "url": "https://api.githubcopilot.com/mcp",
            "headers": {
              "Authorization": "Bearer '"$GITHUB_PAT"'"
            }
          }'

      - name: Run Claude issue implement
        run: |
          claude -p "Implement issue #${{ github.event.issue.number }} in ${{ github.repository }}.
          Requirements:
          1) Understand the issue and implement the required code changes,
          2) Run relevant checks/tests when possible,
          3) Create a new branch, commit the changes with a clear message,
          4) Open a draft pull request linked to this issue via GitHub MCP,
          5) Comment on this issue with implementation summary, branch name, and draft PR link." \
          --dangerously-skip-permissions
