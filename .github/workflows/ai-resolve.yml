name: AI Resolve and Patch PR

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  resolve-pr-comments:
    if: >-
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      startsWith(github.event.comment.body, '/ai-resolve') &&
      !endsWith(github.actor, '[bot]') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    concurrency:
      group: ai-resolve-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true

    env:
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}

    steps:
      - name: Get PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Claude Code with MiniMax
        uses: ./.github/actions/setup-claude-minimax
        with:
          minimax_api_key: ${{ secrets.MINIMAX_API_KEY }}
          github_pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR comments and patch with Claude
        run: |
          claude -p "PR #${{ steps.pr.outputs.number }} in ${{ github.repository }} received /ai-resolve.
          Tasks:
          1) Review all currently open PR review threads/comments.
          2) For valid and actionable review feedback, update code in the checked out branch.
          3) Run relevant tests/lint for touched areas when feasible.
          4) Commit and push fixes to the same PR branch with a clear message.
          5) Resolve threads that are fully addressed by your changes.
          6) If a thread should not be resolved yet, reply with a short and concrete reason.
          7) If branch permissions prevent pushing, leave a PR comment explaining what could not be applied.
          8) Post one final summary comment with:
             - what was changed,
             - commit SHA(s),
             - number of threads resolved,
             - number of threads replied,
             - remaining unresolved action items.
          " \
          --dangerously-skip-permissions
