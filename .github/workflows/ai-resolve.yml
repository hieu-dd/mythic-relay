name: AI Resolve and Patch PR

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  resolve-pr-comments:
    if: >-
      startsWith(github.event.comment.body, '/ai-resolve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    concurrency:
      group: ai-resolve-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true

    env:
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
      GITHUB_PAT: ${{ secrets.CLAUDE_GH_PAT }}
      GH_TOKEN: ${{ secrets.CLAUDE_GH_PAT }}

    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!number) {
              core.setFailed('Could not determine PR number from event payload.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ env.GITHUB_PAT }}

      - name: Setup Claude Code with MiniMax
        uses: ./.github/actions/setup-claude-minimax
        with:
          minimax_api_key: ${{ secrets.MINIMAX_API_KEY }}
          github_pat: ${{ env.GITHUB_PAT }}

      - name: Resolve PR comments and patch with Claude
        run: |
          claude -p "ai-resolve
          PR #${{ steps.pr.outputs.number }} in ${{ github.repository }}.
          Branch is checked out at ${{ steps.pr.outputs.head_ref }}.
          Work autonomously without further human intervention.
          " --dangerously-skip-permissions
